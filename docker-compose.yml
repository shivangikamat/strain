# STRAIN stack: FastAPI + Vite static UI (nginx proxies /api → api:8000)
#
# Usage:
#   docker compose up --build
#   open http://localhost:8080
#
# Optional: mount Kaggle CSV + trained model for full API behaviour:
#   volumes:
#     - ./data/emotions.csv:/app/data/emotions.csv:ro
#     - ./strain/models/baseline_pipeline.joblib:/app/strain/models/baseline_pipeline.joblib:ro

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      STRAIN_EMOTIONS_CSV: ${STRAIN_EMOTIONS_CSV:-}
      STRAIN_CORS_ORIGINS: ${STRAIN_CORS_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}

  frontend:
    build:
      context: ./backend/frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api
